<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings | EventHub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

<div class="logo">
<a href="home.html">EventHub</a>
</div>

<nav class="nav-links" id="navbar-links"></nav>

</header>


<section class="booking-history">
<div class="history-header">
<h2>My Bookings</h2>
<p>View and manage all your event bookings</p>
</div>

<div id="bookingList" class="booking-grid"></div>

<div id="noBookings" class="empty-bookings">
<h3>No bookings yet</h3>
<p>Start exploring events and book your tickets now!</p>
<a href="events.html" class="btn btn-primary">Browse Events</a>
</div>
</section>

<!-- CANCEL BOOKING MODAL -->
<div class="cancel-modal" id="cancelModal">
<div class="modal-content">
<div class="modal-header">
<h3>Cancel Booking</h3>
<button class="close-btn" onclick="closeModal()">&times;</button>
</div>

<div class="modal-body">
<p>Selected Event: <strong id="cancelEventTitle">Event Name</strong></p>

<div class="form-group">
<label>Reason for Cancellation <span class="required">*</span></label>
<select id="cancelReason" required>
<option value="">-- Select a reason --</option>
<option value="schedule_conflict">Schedule Conflict</option>
<option value="financial_reasons">Financial Reasons</option>
<option value="health_issues">Health Issues</option>
<option value="location_issue">Location Issues</option>
<option value="change_of_mind">Change of Mind</option>
<option value="duplicate_booking">Duplicate Booking</option>
<option value="event_cancelled">Event Cancelled</option>
<option value="other">Other</option>
</select>
</div>

<div class="form-group">
<label>Additional Comments</label>
<textarea id="cancelComments" placeholder="Tell us more about your cancellation (optional)" rows="4"></textarea>
</div>

<div class="modal-footer">
<button class="btn btn-primary" onclick="confirmCancel()">Confirm Cancellation</button>
<button class="btn btn-secondary" onclick="closeModal()">Keep Booking</button>
</div>
</div>
</div>
</div>


<script src="script.js"></script>

<script>

let bookings = JSON.parse(sessionStorage.getItem("bookings")) || [];
let cancellingIndex = -1;

const container = document.getElementById("bookingList");
const noBookings = document.getElementById("noBookings");

function displayBookings() {
  container.innerHTML = "";
  
  if(bookings.length === 0){
    noBookings.style.display = "block";
  } else {
    noBookings.style.display = "none";
    
    bookings.forEach((b, index) => {
      const card = document.createElement("div");
      card.className = "booking-card";
      
      const totalPrice = b.price * b.tickets;
      
      card.innerHTML = `
        <div class="booking-card-header">
          <h3>${b.title}</h3>
          <span class="booking-status">Confirmed</span>
        </div>
        
        <div class="booking-card-details">
          <div class="detail-row">
            <span class="detail-label">📅 Date:</span>
            <span class="detail-value">${b.date}</span>
          </div>
          
          <div class="detail-row">
            <span class="detail-label">📍 Location:</span>
            <span class="detail-value">${b.location}</span>
          </div>
          
          <div class="detail-row">
            <span class="detail-label">🎫 Tickets:</span>
            <span class="detail-value">${b.tickets}</span>
          </div>
          
          <div class="detail-row">
            <span class="detail-label">💰 Price:</span>
            <span class="detail-value">₹${totalPrice}</span>
          </div>
          
          <div class="detail-row">
            <span class="detail-label">🕐 Booked on:</span>
            <span class="detail-value">${b.time}</span>
          </div>
        </div>
        
        <div class="booking-card-actions">
          <button class="btn btn-cancel" onclick="openCancelModal(${index}, '${b.title}')">Cancel Booking</button>
          <button class="btn btn-download" onclick="downloadTicket(${index})">Download Ticket</button>
        </div>
      `;
      
      container.appendChild(card);
    });
  }
}

/* ===== MODAL FUNCTIONS ===== */

function openCancelModal(index, title) {
  cancellingIndex = index;
  document.getElementById("cancelEventTitle").textContent = title;
  document.getElementById("cancelReason").value = "";
  document.getElementById("cancelComments").value = "";
  document.getElementById("cancelModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("cancelModal").style.display = "none";
  cancellingIndex = -1;
}

function confirmCancel() {
  const reason = document.getElementById("cancelReason").value;
  const comments = document.getElementById("cancelComments").value;
  
  if (!reason) {
    alert("Please select a reason for cancellation");
    return;
  }
  
  if (cancellingIndex >= 0 && cancellingIndex < bookings.length) {
    const booking = bookings[cancellingIndex];
    
    // Store cancellation record
    let cancellations = JSON.parse(sessionStorage.getItem("cancellations")) || [];
    cancellations.push({
      bookingTitle: booking.title,
      bookingDate: booking.date,
      cancelReason: reason,
      cancelComments: comments,
      cancelledAt: new Date().toLocaleString()
    });
    sessionStorage.setItem("cancellations", JSON.stringify(cancellations));
    
    // Remove booking
    bookings.splice(cancellingIndex, 1);
    sessionStorage.setItem("bookings", JSON.stringify(bookings));
    
    closeModal();
    displayBookings();
    alert("✓ Booking cancelled successfully. A confirmation has been saved.");
  }
}

/* ===== DOWNLOAD TICKET ===== */

function downloadTicket(index) {
  if (index >= 0 && index < bookings.length) {
    const booking = bookings[index];
    const totalPrice = booking.price * booking.tickets;
    
    let ticketContent = `Event Booking Ticket
====================

Event: ${booking.title}
Date: ${booking.date}
Location: ${booking.location}
Tickets: ${booking.tickets}
Price per Ticket: ₹${booking.price}
Total Price: ₹${totalPrice}

Passenger Name: ${booking.name}
Email: ${booking.email}
Booking Date: ${booking.time}

Important: Please keep this ticket safe.
Show this ticket at the event venue.

Thank you for booking with EventHub!`;
    
    const blob = new Blob([ticketContent], { type: "text/plain" });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `ticket_${booking.title.replace(/\s+/g, "_")}.txt`;
    a.click();
    window.URL.revokeObjectURL(url);
  }
}

renderNavbar();
displayBookings();

</script>

</body>
</html>
